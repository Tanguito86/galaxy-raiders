name: AI Task Runner

on:
  workflow_dispatch:

jobs:
  run-ai-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar git
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"

      - name: Leer TASK.md
        run: |
          echo "===== TASK ====="
          cat ai/TASK.md

      - name: Simular cambio IA
        run: |
          echo "IA ejecutó esta tarea el $(date)" > ai/RESULT.md

      - name: Commit y push automático
        run: |
          git add .
          git commit -m "ai: ejecución automática desde TASK.md" || echo "No changes"
          git push
