name: AI Task Runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-ai-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"

      - name: Leer TASK.md
        run: |
          echo "===== TASK ====="
          cat ai/TASK.md

      - name: Ejecutar IA Codex-ready
        run: |
          node scripts/ai-runner.js

      - name: Commit y push automático
        run: |
          git add .
          git commit -m "ai: ejecución automática desde TASK.md" || echo "No changes"
          git push
