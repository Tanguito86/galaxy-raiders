name: AI Task Runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-ai-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"

      - name: Leer TASK.md
        run: |
          echo "===== TASK ====="
          cat ai/TASK.md

      - name: Instalar dependencias IA
        run: npm install openai

      - name: Ejecutar IA real DeepSeek
        env:
            DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          node scripts/ai-runner.js

      - name: Validar proyecto
        run: |
          npm run validate

      - name: Commit y push automatico
        run: |
          git add .
          git commit -m "ai: aplicar cambios desde TASK.md" || echo "No changes"
          git push